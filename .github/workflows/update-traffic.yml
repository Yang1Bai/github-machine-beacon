name: Update Traffic Snapshot

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: traffic-snapshot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Update traffic snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/update_traffic.py

      - name: Generate site files
        run: python scripts/build.py

      - name: Validate machine-readable surfaces
        run: python scripts/validate.py

      - name: Commit updated traffic snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add data/traffic.json traffic.json site/traffic.json site/index.html crawler-manifest.json site/crawler-manifest.json llms.txt llms-full.txt site/llms.txt site/llms-full.txt site/sitemap.xml
            git commit -m "Update traffic snapshot"
            git push
          else
            echo "No traffic changes to commit."
          fi
