name: Update Traffic Snapshot

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: traffic-snapshot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Check traffic token
        id: token
        run: |
          if [ -z "$TRAFFIC_TOKEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "TRAFFIC_TOKEN is not configured. Skipping automatic traffic refresh."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update traffic snapshot
        if: steps.token.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ env.TRAFFIC_TOKEN }}
        run: python scripts/update_traffic.py

      - name: Generate site files
        if: steps.token.outputs.skip != 'true'
        run: python scripts/build.py

      - name: Validate machine-readable surfaces
        if: steps.token.outputs.skip != 'true'
        run: python scripts/validate.py

      - name: Commit updated traffic snapshot
        if: steps.token.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add data/traffic.json traffic.json site/traffic.json site/index.html crawler-manifest.json site/crawler-manifest.json llms.txt llms-full.txt site/llms.txt site/llms-full.txt site/sitemap.xml
            git commit -m "Update traffic snapshot"
            git push
          else
            echo "No traffic changes to commit."
          fi
