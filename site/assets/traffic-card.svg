<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Current verified traffic for GitHub Machine Beacon</title>
  <desc id="desc">GitHub Traffic API snapshot showing repository views, unique visitors, clones, and unavailable machine versus human split.</desc>
